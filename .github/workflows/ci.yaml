name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run book contract tests
        run: |
          python3 -m unittest discover -s tests -p 'test_*.py' -v
          python3 check_project_rules.py .

      - name: Install Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Install CJK fonts and PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra poppler-utils

      - name: Install mdPress 0.7.11
        env:
          MDPRESS_VERSION: "0.7.11"
          MDPRESS_SHA256: "cf499f03926f09debb3460b751e1e8f789d098fa81e4265deb7bcac269f72efe"
        run: |
          archive="$RUNNER_TEMP/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 \
            "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" \
            -o "$archive"
          echo "${MDPRESS_SHA256}  $archive" | sha256sum -c -
          tar xzf "$archive" -C "$RUNNER_TEMP" mdpress
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 "$RUNNER_TEMP/mdpress" "$RUNNER_TEMP/bin/mdpress"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build PDF
        run: |
          mkdir -p dist
          mdpress build --format pdf --output dist/ai-for-business-school.pdf

      - name: Verify build artifact
        run: |
          title=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("book.yaml").read_text(encoding="utf-8")
          match = re.search(r'^\s*title:\s*["\x27](.+?)["\x27]\s*$', text, re.MULTILINE)
          if not match:
              raise SystemExit("book title not found")
          print(match.group(1))
          PY
          )
          python3 tools/verify_artifacts.py \
            --title "$title" \
            --pdf dist/ai-for-business-school.pdf \
            --checksums dist/SHA256SUMS
          (cd dist && sha256sum -c SHA256SUMS)

      - name: Upload verified PDF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-for-business-school-pdf
          path: |
            dist/ai-for-business-school.pdf
            dist/SHA256SUMS
          if-no-files-found: error
